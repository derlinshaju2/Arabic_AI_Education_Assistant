<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Arabic AI Education Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-visual" aria-hidden="true">
            <div class="brand-mark large">
                <svg viewBox="0 0 24 24" role="img">
                    <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" fill="none" stroke="currentColor" stroke-width="1.7"/>
                    <path d="M8 10.2h8M8 13.8h5.2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                    <path d="M12 7v10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="visual-board">
                <div class="visual-line wide"></div>
                <div class="visual-row">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="visual-card">
                    <div></div>
                    <div></div>
                </div>
            </div>
        </section>

        <section class="auth-card">
            <div class="brand-row">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" role="img">
                        <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M8 10.2h8M8 13.8h5.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </div>
                <span>Arabic AI Education Assistant</span>
            </div>

            <div class="auth-heading">
                <h1>Reset password</h1>
                <p>Enter your email and we'll send you instructions.</p>
            </div>

            <form class="stack" action="/reset-password" method="post" novalidate>
                <div class="field">
                    <span>Email</span>
                    <input name="email" type="email" autocomplete="email" placeholder="ahmed@example.com" required>
                </div>

                {% if error %}
                <p class="alert error-msg">{{ error }}</p>
                {% endif %}

                {% if success %}
                <p class="reset-note">{{ success }}</p>
                {% endif %}

                <button class="button primary full" type="submit">Send instructions</button>
            </form>

            <p class="auth-switch">
                <a href="/login">Back to sign in</a>
            </p>
        </section>
    </main>
</body>
</html>
