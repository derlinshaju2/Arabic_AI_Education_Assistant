<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliArabic - Create Account</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --purple: #6366f1;
      --purple-dark: #4f46e5;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --shadow: 0 26px 80px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background: #eef3fb;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img,
    svg {
      max-width: 100%;
    }

    button,
    input {
      font: inherit;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    .hero-bg::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.15), transparent 50%);
      filter: blur(100px);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    .preview-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px clamp(18px, 4vw, 72px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(16px);
    }

    .preview-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 800;
    }

    .preview-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    .preview-links {
      display: flex;
      gap: 24px;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    .preview-hero {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
    }

    .preview-hero h1 {
      margin: 0 0 16px;
      color: rgba(15, 23, 42, 0.3);
      font-size: clamp(38px, 7vw, 72px);
      line-height: 1;
      font-weight: 850;
    }

    .preview-hero p {
      margin: 0;
      color: rgba(51, 65, 85, 0.28);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      min-height: 100dvh;
      overflow-y: auto;
      background: rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .signup-card {
      position: relative;
      width: min(550px, 100%);
      padding: clamp(24px, 4vw, 34px);
      max-height: calc(100dvh - 40px);
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow);
      animation: slideUp 0.35s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #1f2937;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .close-btn:hover {
      background: #f1f5f9;
      color: var(--purple);
      transform: scale(1.04);
    }

    .signup-header {
      margin-bottom: 24px;
      padding-right: 40px;
    }

    .signup-header h2 {
      margin: 0;
      color: #0f172a;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 850;
    }

    .signup-header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .signup-form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 9px;
    }

    .field label {
      color: #0f172a;
      font-size: 14px;
      font-weight: 800;
    }

    .required {
      color: #ef4444;
    }

    .input-field {
      width: 100%;
      min-width: 0;
      min-height: 48px;
      padding: 0 16px;
      border: 1.5px solid #e0e3e8;
      border-radius: 16px;
      outline: 0;
      background: #f8f9fa;
      color: #111827;
      font-size: 14px;
      font-weight: 600;
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .input-field::placeholder {
      color: #94a3b8;
      font-weight: 500;
    }

    .input-field:focus {
      border-color: var(--purple);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .field-hint {
      margin: 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    .alert {
      padding: 12px 14px;
      border: 1px solid rgba(220, 38, 38, 0.18);
      border-radius: 12px;
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
    }

    .gradient-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      margin-top: 8px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #ffffff;
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(99, 102, 241, 0.26);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .gradient-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(99, 102, 241, 0.34);
      filter: brightness(1.03);
    }

    .gradient-button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding-top: 2px;
      color: #8b92a5;
      font-size: 13px;
      font-weight: 650;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, #d9e2ef);
    }

    .divider::after {
      background: linear-gradient(90deg, #d9e2ef, transparent);
    }

    .google-auth-host {
      display: grid;
      width: 100%;
      min-height: 50px;
      place-items: center;
    }

    .google-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 50px;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .google-button:hover {
      border-color: #bfcce0;
      background: #f8fafc;
      box-shadow: 0 14px 28px rgba(99, 102, 241, 0.12);
      transform: translateY(-1px);
    }

    .google-button svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .google-button[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.62;
      pointer-events: none;
      transform: none;
    }

    .login-note {
      margin: 20px 0 0;
      padding-top: 18px;
      border-top: 1px solid rgba(226, 232, 240, 0.8);
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    .login-link {
      color: var(--purple);
      font-weight: 800;
      text-decoration: none;
    }

    .login-link:hover {
      color: var(--purple-dark);
    }

    @media (max-width: 640px) {
      .preview-links {
        display: none;
      }

      .preview-hero h1 {
        padding: 0 18px;
      }

      .modal-overlay {
        place-items: start center;
        padding: 12px;
      }

      .signup-card {
        width: 100%;
        max-height: none;
        padding: 24px 16px 20px;
        border-radius: 18px;
      }

      .close-btn {
        top: 14px;
        right: 14px;
      }

      .signup-header {
        margin-bottom: 18px;
        padding-right: 38px;
      }

      .signup-form {
        gap: 14px;
      }

      .input-field {
        min-height: 46px;
        border-radius: 14px;
      }

      .gradient-button,
      .google-button {
        min-height: 48px;
      }
    }

    @media (max-width: 420px) {
      .preview-nav {
        padding: 14px 16px;
      }

      .preview-brand {
        min-width: 0;
      }

      .preview-brand span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .preview-hero {
        padding: 0 14px;
      }

      .preview-hero h1 {
        font-size: 34px;
      }

      .preview-hero p {
        font-size: 15px;
      }
    }

    @media (max-height: 700px) {
      .modal-overlay {
        place-items: start center;
      }
    }
  </style>
</head>
<body>
  <main class="hero-bg" aria-hidden="true">
    <nav class="preview-nav">
      <div class="preview-brand">
        <span class="preview-mark"></span>
        <span>IntelliArabic</span>
      </div>
      <div class="preview-links">
        <span>Home</span>
        <span>Features</span>
        <span>About</span>
      </div>
    </nav>

    <section class="preview-hero">
      <div>
        <h1>AI-Powered Arabic Learning</h1>
        <p>Premium education platform</p>
      </div>
    </section>
  </main>

  <section class="modal-overlay" aria-label="Create account dialog">
    <div class="signup-card" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <button onclick="window.location.href='/'" class="close-btn" type="button" title="Close" aria-label="Close signup">
        &times;
      </button>

      <header class="signup-header">
        <h2 id="signupTitle">Create your account</h2>
        <p>Join IntelliArabic today</p>
      </header>

      <form id="signupForm" method="POST" class="signup-form">
        <div class="field">
          <label for="name">Full Name <span class="required">*</span></label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            value="{{ form.name if form is defined and form.name is defined else '' }}"
            class="input-field"
            autocomplete="name"
            required
          >
        </div>

        <div class="field">
          <label for="email">Email address <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            value="{{ form.email if form is defined and form.email is defined else '' }}"
            class="input-field"
            autocomplete="email"
            required
          >
        </div>

        <div class="field">
          <label for="password">Password <span class="required">*</span></label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="********"
            class="input-field"
            autocomplete="new-password"
            required
          >
          <p class="field-hint">At least 8 characters</p>
        </div>

        <div id="signupError" class="alert" role="alert" {% if not error %}hidden style="display: none;"{% endif %}>
          {{ error or '' }}
        </div>

        <button type="submit" class="gradient-button">Create Account</button>

        <div class="divider">Or continue with</div>

        <div id="googleSignupButton" class="google-auth-host"></div>
      </form>

      <p class="login-note">
        Already have an account?
        <a href="/login" class="login-link">Sign in</a>
      </p>
    </div>
  </section>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        password: formData.get('password'),
        confirm_password: formData.get('password')
      };
      const errorBox = document.getElementById('signupError');
      const submitButton = this.querySelector('button[type="submit"]');
      errorBox.style.display = 'none';
      errorBox.hidden = true;
      errorBox.textContent = '';
      submitButton.disabled = true;

      fetch('/signup', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data),
        credentials: 'same-origin'
      })
      .then(response => response.json().then(data => ({ ok: response.ok, data })))
      .then(result => {
        if (result.ok && result.data.status === 'success') {
          if (result.data.token) {
            sessionStorage.setItem('authToken', result.data.token);
          }
          const tokenParam = result.data.token ? ('?auth_token=' + encodeURIComponent(result.data.token)) : '';
          window.location.href = '/modules' + tokenParam;
          return;
        }
        throw new Error(result.data.message || 'Could not create your account. Please try again.');
      })
      .catch(error => {
        errorBox.textContent = error.message || 'An error occurred. Please try again.';
        errorBox.hidden = false;
        errorBox.style.display = 'block';
      })
      .finally(() => {
        submitButton.disabled = false;
      });
    });
  </script>
  <script src="{{ url_for('static', filename='google-auth.js') }}"></script>
  <script>
    window.IntelliArabicGoogleAuth.render({
      buttonId: 'googleSignupButton',
      alertId: 'signupError',
      clientId: {{ google_client_id|tojson }},
      nonce: {{ google_nonce|default('')|tojson }},
      loginUrl: {{ url_for('google_login')|tojson }},
      nextUrl: {{ url_for('modules')|tojson }}
    });
  </script>
</body>
</html>
