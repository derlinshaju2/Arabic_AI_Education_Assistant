<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliArabic - Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    
    .glass-blur {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    .hero-bg {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      position: relative;
      overflow: hidden;
    }
    
    .hero-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.15), transparent 50%);
      filter: blur(100px);
      animation: float 20s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }
    
    .modal-card {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.4s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .input-field {
      background: #f8f9fa;
      border: 1.5px solid #e0e3e8;
      transition: all 0.3s ease;
    }
    
    .input-field:focus {
      background: #ffffff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      outline: none;
    }
    
    .gradient-button {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .gradient-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
    }
    
    .gradient-button:active {
      transform: translateY(0);
    }
    
    .google-button {
      border: 1.5px solid #e0e3e8;
      background: #ffffff;
      transition: all 0.3s ease;
    }
    
    .google-button:hover {
      background: #f8f9fa;
      border-color: #d0d6e0;
    }

    .google-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .divider-text {
      color: #8b92a5;
      font-size: 13px;
      font-weight: 500;
    }
    
    .login-link {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    
    .login-link:hover {
      color: #4f46e5;
    }
    
    .close-btn {
      color: #1f2937;
      font-size: 28px;
      font-weight: 300;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s ease;
    }
    
    .close-btn:hover {
      color: #6366f1;
    }
    
    @media (max-width: 640px) {
      .modal-card {
        width: calc(100% - 32px);
        margin: 16px;
      }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Blurred Background -->
  <div class="hero-bg fixed inset-0 z-0">
    <!-- Navigation Bar Simulation -->
    <div class="absolute top-0 left-0 right-0 backdrop-blur-lg bg-white/40 border-b border-white/20">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-lg"></div>
          <div class="text-sm font-semibold text-slate-900">IntelliArabic</div>
        </div>
        <div class="hidden md:flex gap-6 text-sm text-slate-700">
          <span class="hover:text-indigo-600 cursor-pointer">Home</span>
          <span class="hover:text-indigo-600 cursor-pointer">Features</span>
          <span class="hover:text-indigo-600 cursor-pointer">About</span>
        </div>
      </div>
    </div>
    
    <!-- Hero Text -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="text-center">
        <h1 class="text-6xl font-bold text-slate-900/30 mb-4">AI-Powered Arabic Learning</h1>
        <p class="text-xl text-slate-700/25">Premium education platform</p>
      </div>
    </div>
  </div>

  <!-- Glass Modal Overlay -->
  <div class="glass-blur fixed inset-0 z-10 bg-black/10 flex items-center justify-center p-4">
    <!-- Modal Card -->
    <div class="modal-card bg-white rounded-[20px] w-full max-w-[550px] p-8 relative">
      <!-- Close Button -->
      <button onclick="window.location.href='/'" class="close-btn absolute top-6 right-6" title="Close">
        ×
      </button>

      <!-- Header -->
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-900">Create your account</h2>
        <p class="text-sm text-slate-600 mt-1">Join IntelliArabic today</p>
      </div>

      <!-- Form -->
      <form id="signupForm" method="POST" class="space-y-4">
        <!-- Name Input -->
        <div class="space-y-2.5">
          <label for="name" class="block text-sm font-bold text-slate-900">
            Full Name <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="John Doe"
            value="{{ form.name if form is defined and form.name is defined else '' }}"
            class="input-field w-full px-4 py-3 rounded-[16px] text-sm text-slate-900 placeholder:text-slate-400"
            required
          />
        </div>

        <!-- Email Input -->
        <div class="space-y-2.5">
          <label for="email" class="block text-sm font-bold text-slate-900">
            Email address <span class="text-red-500">*</span>
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com"
            value="{{ form.email if form is defined and form.email is defined else '' }}"
            class="input-field w-full px-4 py-3 rounded-[16px] text-sm text-slate-900 placeholder:text-slate-400"
            required
          />
        </div>

        <!-- Password Input -->
        <div class="space-y-2.5">
          <label for="password" class="block text-sm font-bold text-slate-900">
            Password <span class="text-red-500">*</span>
          </label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            class="input-field w-full px-4 py-3 rounded-[16px] text-sm text-slate-900 placeholder:text-slate-400"
            required
          />
          <p class="text-xs text-slate-500">At least 8 characters</p>
        </div>

        <!-- Error Message (if any) -->
        <div id="signupError" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-[12px] text-sm font-medium" {% if not error %}style="display: none;"{% endif %}>
          {{ error or '' }}
        </div>

        <!-- Sign Up Button -->
        <button 
          type="submit"
          class="gradient-button w-full py-3 rounded-[16px] text-white font-bold text-sm transition-all duration-300 mt-6"
        >
          Create Account
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 pt-2">
          <div class="flex-1 h-px bg-gradient-to-r from-slate-200 to-slate-100"></div>
          <span class="divider-text">Or continue with</span>
          <div class="flex-1 h-px bg-gradient-to-l from-slate-200 to-slate-100"></div>
        </div>

        <!-- Google Signup Button -->
        <button
          type="button"
          {% if google_client_id %}
          onclick="window.location.href='/google-login'"
          {% else %}
          disabled
          title="Set GOOGLE_CLIENT_ID in .env to enable Google sign-in."
          {% endif %}
          class="google-button w-full py-3 rounded-[16px] flex items-center justify-center gap-3 font-bold text-sm text-slate-900 transition-all duration-300"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#1f2937" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- Login Link -->
      <div class="text-center pt-4 mt-6 border-t border-slate-200/50">
        <p class="text-sm text-slate-600">
          Already have an account? 
          <a href="/login" class="login-link">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    // Handle form submission
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const formData = new FormData(this);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        password: formData.get('password'),
        confirm_password: formData.get('password')
      };
      const errorBox = document.getElementById('signupError');
      const submitButton = this.querySelector('button[type="submit"]');
      errorBox.style.display = 'none';
      errorBox.textContent = '';
      submitButton.disabled = true;

      fetch('/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
        credentials: 'same-origin'
      })
      .then(response => response.json().then(data => ({ ok: response.ok, data })))
      .then(result => {
        if (result.ok && result.data.status === 'success') {
          window.location.href = '/dashboard';
          return;
        }
        throw new Error(result.data.message || 'Could not create your account. Please try again.');
      })
      .catch(error => {
        console.error('Error:', error);
        errorBox.textContent = error.message || 'An error occurred. Please try again.';
        errorBox.style.display = 'block';
      })
      .finally(() => {
        submitButton.disabled = false;
      });
    });
  </script>
</body>
</html>
