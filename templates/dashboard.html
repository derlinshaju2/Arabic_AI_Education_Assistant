<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Arabic AI Education Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-mark">
                        <img src="/static/arabic.png" alt="IntelliArabic" style="height:24px;" />
                    </div>
                    <span class="brand-text">IntelliArabic</span>
                </div>
                <button class="sidebar-toggle-mobile" id="sidebarToggleMobile" type="button" aria-label="Toggle sidebar" aria-expanded="false">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Workspace</p>
                    <button class="nav-item active" data-module="captioning" onclick="switchModule(event, 'captioning')">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M4 7.5A2.5 2.5 0 016.5 5h11A2.5 2.5 0 0120 7.5v9A2.5 2.5 0 0117.5 19h-11A2.5 2.5 0 014 16.5v-9z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M8.5 15l2.2-2.4 1.9 1.8 2.2-3 2.7 3.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Image Captioning</span>
                    </button>
                    <button class="nav-item" data-module="evaluation" onclick="switchModule(event, 'evaluation')">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M7 3h7l4 4v14H7a2 2 0 01-2-2V5a2 2 0 012-2z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M14 3v5h5M8.5 12h7M8.5 15h7M8.5 18h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span>Answer Evaluation</span>
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item danger" onclick="logout()" title="Sign out of your account">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TOP NAVIGATION -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle-mobile topbar-sidebar-toggle" id="sidebarToggleTop" type="button" aria-label="Open modules menu" aria-expanded="false">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <h1 class="page-title" id="pageTitle">Image Captioning</h1>
                </div>
                <nav class="top-actions" aria-label="Account">
                    <button class="lang-switch" id="langSwitch" aria-label="Switch language" title="Switch Language">
                        <svg viewBox="0 0 24 24" width="18" height="18" role="img">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                        <span id="langLabel">العربية</span>
                    </button>

                    <div class="profile-dropdown-wrapper">
                        <button class="profile-trigger" id="profileTrigger" aria-label="User menu" aria-haspopup="menu" aria-controls="profileDropdown" aria-expanded="false">
                            {% if user.profileImage %}
                            <img class="user-avatar" src="{{ user.profileImage }}" alt="{{ user.name }}" width="36" height="36">
                            {% else %}
                            <div class="user-avatar initial">{{ user.name[:1].upper() if user.name else 'U' }}</div>
                            {% endif %}
                            <svg class="dropdown-chevron" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <div class="profile-dropdown" id="profileDropdown" role="menu" aria-hidden="true">
                            <div class="dropdown-header">
                                {% if user.profileImage %}
                                <img class="dropdown-avatar" src="{{ user.profileImage }}" alt="{{ user.name }}" width="44" height="44">
                                {% else %}
                                <div class="dropdown-avatar initial">{{ user.name[:1].upper() if user.name else 'U' }}</div>
                                {% endif %}
                                <div class="dropdown-user-copy">
                                    <span class="dropdown-user-name">{{ user.name }}</span>
                                    <span class="dropdown-user-email">{{ user.email }}</span>
                                </div>
                            </div>

                            <div class="dropdown-section" role="none">
                                <a href="/modules" class="dropdown-item active" role="menuitem">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-8.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                    </svg>
                                    <span>Dashboard</span>
                                </a>
                            </div>

                            <div class="dropdown-divider"></div>

                            <div class="dropdown-section" role="none">
                                <button type="button" class="dropdown-item" role="menuitem" onclick="showHistoryModal(); closeProfileMenu();">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M12 8v5l3 2.5M21 12a9 9 0 1 1-3.2-6.9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M21 5v5h-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <span>History</span>
                                </button>
                                <button type="button" class="dropdown-item" role="menuitem">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                                        <path d="M19.4 15a1.8 1.8 0 0 0 .36 2l.05.05a2.1 2.1 0 0 1-2.97 2.97l-.05-.05a1.8 1.8 0 0 0-2-.36 1.8 1.8 0 0 0-1.1 1.65V21.4a2.1 2.1 0 0 1-4.2 0v-.08a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-2 .36l-.05.05a2.1 2.1 0 1 1-2.97-2.97l.05-.05a1.8 1.8 0 0 0 .36-2 1.8 1.8 0 0 0-1.65-1.1H2.1a2.1 2.1 0 0 1 0-4.2h.08a1.8 1.8 0 0 0 1.65-1.1 1.8 1.8 0 0 0-.36-2l-.05-.05A2.1 2.1 0 1 1 6.39 3.6l.05.05a1.8 1.8 0 0 0 2 .36 1.8 1.8 0 0 0 1.1-1.65V2.1a2.1 2.1 0 0 1 4.2 0v.08a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 2-.36l.05-.05a2.1 2.1 0 1 1 2.97 2.97l-.05.05a1.8 1.8 0 0 0-.36 2c.28.66.93 1.1 1.65 1.1h.08a2.1 2.1 0 0 1 0 4.2h-.08A1.8 1.8 0 0 0 19.4 15Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                                    </svg>
                                    <span>Settings</span>
                                </button>
                                <button type="button" class="dropdown-item" role="menuitem" onclick="toggleProfileLanguage();">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/>
                                        <path d="M3 12h18M12 3c2.1 2.3 3.1 5.3 3.1 9S14.1 18.7 12 21c-2.1-2.3-3.1-5.3-3.1-9S9.9 5.3 12 3Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                                    </svg>
                                    <span>Language</span>
                                </button>
                            </div>

                            <div class="dropdown-divider"></div>

                            <div class="dropdown-section" role="none">
                                <button type="button" class="dropdown-item" role="menuitem">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M12 18h.01M9.3 9a3 3 0 1 1 5.3 1.9c-.7.6-1.6 1-2.1 1.8-.3.4-.5.9-.5 1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/>
                                    </svg>
                                    <span>Help &amp; Support</span>
                                </button>
                            </div>

                            <div class="dropdown-divider"></div>

                            <div class="dropdown-section" role="none">
                                <a href="/logout" class="dropdown-item danger" role="menuitem" onclick="logout(); return false;">
                                    <svg class="profile-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <span>Logout</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </nav>
            </header>

            <!-- CONTENT AREA -->
            <main class="content-area" id="contentArea">
                <div class="loading-spinner">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
                        <path d="M12 3a9 9 0 019 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="20" stroke-dashoffset="0" style="animation: spin 1s linear infinite"/>
                    </svg>
                    <p>Loading module...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div class="modal-overlay" id="historyModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Activity History</h2>
                <button class="modal-close" onclick="closeHistoryModal()" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18 6L6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div class="modal-body" id="historyList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <p>No activity yet. Start using the tools to see your history.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.USER_DATA = {{ user | tojson }};
        window.AUTH_TOKEN = {{ auth_token|default('')|tojson }};
        if (window.AUTH_TOKEN) {
            sessionStorage.setItem('authToken', window.AUTH_TOKEN);
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            window.AUTH_TOKEN = sessionStorage.getItem('authToken') || '';
        }
        // Initialize dashboard with first module
        document.addEventListener('DOMContentLoaded', function() {
            switchModule(null, 'captioning');
        });
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
