
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Arabic AI Education Assistant for image captioning and automated answer evaluation."
    >

    <title>Dashboard - Arabic AI Education Assistant</title>

    <!-- Main application styles -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}?v=dashboard-base-20260626-4"
    >

    <!-- Mobile module and sidebar fixes -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='mobile-module-fix.css') }}?v=mobile-module-fix-20260626-2"
    >

    <!--
        Load this stylesheet last so its shared module-button
        rules override any older button styles in style.css.
    -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='dashboard-module-overrides.css') }}?v=caption-results-state-fill-20260627-1"
    >
</head>

<body>
    <div class="dashboard-container">

        <!-- ==========================================
             SIDEBAR
             ========================================== -->
        <aside
            class="sidebar"
            id="dashboardSidebar"
            aria-label="Dashboard navigation"
        >
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-mark">
                        <img
                            src="{{ url_for('static', filename='arabic.png') }}"
                            alt="IntelliArabic"
                            width="24"
                            height="24"
                        >
                    </div>

                    <span class="brand-text">
                        IntelliArabic
                    </span>
                </div>

                <!-- Desktop sidebar collapse button -->
                <button
                    class="sidebar-collapse-toggle"
                    id="sidebarCollapseToggle"
                    type="button"
                    aria-label="Collapse sidebar"
                    aria-controls="dashboardSidebar"
                    aria-expanded="true"
                    title="Collapse sidebar"
                >
                    <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        aria-hidden="true"
                    >
                        <rect
                            x="3.5"
                            y="4.5"
                            width="17"
                            height="15"
                            rx="3"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.7"
                        />

                        <path
                            d="M9 5v14M15 9l-3 3 3 3"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.7"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </button>

                <!-- Mobile sidebar close/toggle button -->
                <button
                    class="sidebar-toggle-mobile"
                    id="sidebarToggleMobile"
                    type="button"
                    aria-label="Toggle modules menu"
                    aria-controls="dashboardSidebar"
                    aria-expanded="false"
                >
                    <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        aria-hidden="true"
                    >
                        <path
                            d="M4 6h16M4 12h16M4 18h16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                    </svg>
                </button>
            </div>

            <nav
                class="sidebar-nav"
                aria-label="Workspace modules"
            >
                <div class="nav-section">
                    <p class="nav-section-title">
                        WORKSPACE
                    </p>

                    <button
                        class="nav-item active"
                        data-module="captioning"
                        onclick="window.switchModule(event, 'captioning')"
                        aria-current="page"
                        aria-controls="contentArea"
                        title="Image Captioning"
                        type="button"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            aria-hidden="true"
                        >
                            <path
                                d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            />

                            <path
                                d="m8.5 15 2.2-2.4 1.9 1.8 2.2-3 2.7 3.6"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>

                        <span>Image Captioning</span>
                    </button>

                    <button
                        class="nav-item"
                        data-module="evaluation"
                        onclick="window.switchModule(event, 'evaluation')"
                        aria-controls="contentArea"
                        title="Answer Evaluation"
                        type="button"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            aria-hidden="true"
                        >
                            <path
                                d="M7 3h7l4 4v14H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            />

                            <path
                                d="M14 3v5h5M8.5 12h7M8.5 15h7M8.5 18h4"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                                stroke-linecap="round"
                            />
                        </svg>

                        <span>Answer Evaluation</span>
                    </button>
                </div>
            </nav>

            <!-- User profile -->
            <div class="sidebar-footer">
                <div class="profile-dropdown-wrapper sidebar-profile-wrapper">
                    <button
                        class="sidebar-profile-trigger"
                        id="profileTrigger"
                        type="button"
                        aria-label="Open user profile menu"
                        aria-haspopup="menu"
                        aria-controls="profileDropdown"
                        aria-expanded="false"
                    >
                        <span class="sidebar-avatar-wrap">
                            {% if user.profileImage %}
                            <img
                                class="sidebar-profile-avatar"
                                src="{{ user.profileImage }}"
                                alt="{{ user.name }}"
                                width="38"
                                height="38"
                            >
                            {% else %}
                            <span
                                class="sidebar-profile-avatar initial"
                                aria-hidden="true"
                            >
                                {{ user.name[:1].upper() if user.name else 'U' }}
                            </span>
                            {% endif %}

                            <span
                                class="sidebar-online-dot"
                                aria-hidden="true"
                            ></span>
                        </span>

                        <span class="sidebar-profile-copy">
                            <span class="sidebar-profile-name">
                                {{ user.name }}
                            </span>

                            <span class="sidebar-profile-email">
                                {{ user.email }}
                            </span>
                        </span>

                        <svg
                            class="sidebar-profile-chevron"
                            viewBox="0 0 24 24"
                            width="16"
                            height="16"
                            aria-hidden="true"
                        >
                            <path
                                d="m6 9 6 6 6-6"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>

                    <div
                        class="profile-dropdown sidebar-profile-menu"
                        id="profileDropdown"
                        role="menu"
                        aria-hidden="true"
                    >
                        <a
                            href="/logout"
                            class="dropdown-item danger"
                            role="menuitem"
                            data-logout-link
                            onclick="return window.logout ? window.logout(event) : true"
                        >
                            <svg
                                class="profile-menu-icon"
                                viewBox="0 0 24 24"
                                aria-hidden="true"
                            >
                                <path
                                    d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.8"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>

                            <span>Logout</span>
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ==========================================
             MAIN CONTENT
             ========================================== -->
        <div class="main-content">

            <!-- Top navigation -->
            <header class="topbar">
                <div class="topbar-left">
                    <button
                        class="sidebar-toggle-mobile topbar-sidebar-toggle"
                        id="sidebarToggleTop"
                        type="button"
                        aria-label="Open modules menu"
                        aria-controls="dashboardSidebar"
                        aria-expanded="false"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            width="20"
                            height="20"
                            aria-hidden="true"
                        >
                            <path
                                d="M4 6h16M4 12h16M4 18h16"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                            />
                        </svg>
                    </button>

                    <h1
                        class="page-title"
                        id="pageTitle"
                    >
                        Image Captioning
                    </h1>
                </div>

                <nav
                    class="top-actions"
                    aria-label="Dashboard preferences"
                >
                    <button
                        class="lang-switch"
                        id="langSwitch"
                        type="button"
                        aria-label="Switch language"
                        title="Switch language"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            aria-hidden="true"
                        >
                            <circle
                                cx="12"
                                cy="12"
                                r="10"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            />

                            <path
                                d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10Z"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            />
                        </svg>

                        <span id="langLabel">
                            العربية
                        </span>
                    </button>
                </nav>
            </header>

            <!-- Dynamically loaded module content -->
            <main
                class="content-area"
                id="contentArea"
                tabindex="-1"
                aria-live="polite"
                aria-busy="true"
            >
                <div class="loading-spinner">
                    <svg
                        viewBox="0 0 24 24"
                        width="48"
                        height="48"
                        aria-hidden="true"
                    >
                        <circle
                            cx="12"
                            cy="12"
                            r="9"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            opacity="0.2"
                        />

                        <path
                            d="M12 3a9 9 0 0 1 9 9"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-dasharray="20"
                            stroke-dashoffset="0"
                            style="animation: spin 1s linear infinite;"
                        />
                    </svg>

                    <p>Loading module...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- ==========================================
         HISTORY MODAL
         ========================================== -->
    <div
        class="modal-overlay"
        id="historyModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="historyModalTitle"
        aria-hidden="true"
        style="display: none;"
    >
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="historyModalTitle">
                    Activity History
                </h2>

                <button
                    class="modal-close"
                    type="button"
                    onclick="closeHistoryModal()"
                    aria-label="Close activity history"
                >
                    <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        aria-hidden="true"
                    >
                        <path
                            d="M18 6 6 18M6 6l12 12"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                    </svg>
                </button>
            </div>

            <div
                class="modal-body"
                id="historyList"
            >
                <div class="empty-state">
                    <svg
                        viewBox="0 0 24 24"
                        width="48"
                        height="48"
                        aria-hidden="true"
                    >
                        <path
                            d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                        />
                    </svg>

                    <p>
                        No activity yet. Start using the tools to see your history.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         USER AND AUTHENTICATION DATA
         ========================================== -->
    <script>
        window.USER_DATA = {{ user | tojson }};
        window.AUTH_TOKEN =
            {{ auth_token | default('') | tojson }};

        if (window.AUTH_TOKEN) {
            try {
                sessionStorage.setItem(
                    'authToken',
                    window.AUTH_TOKEN
                );

                window.history.replaceState(
                    {},
                    document.title,
                    window.location.pathname
                );
            } catch (error) {
                console.warn(
                    'Unable to save the authentication token.',
                    error
                );
            }
        } else {
            try {
                window.AUTH_TOKEN =
                    sessionStorage.getItem('authToken') || '';
            } catch (error) {
                window.AUTH_TOKEN = '';

                console.warn(
                    'Unable to read the authentication token.',
                    error
                );
            }
        }
    </script>

    <!-- Main application JavaScript -->
    <script
        src="{{ url_for('static', filename='script.js') }}?v=caption-results-state-fill-20260627-1"
    ></script>

    <!-- Mobile sidebar behavior -->
    <script
        src="{{ url_for('static', filename='mobile-module-fix.js') }}?v=mobile-module-fix-20260626-2"
    ></script>

    <!-- Load Image Captioning as the default module -->
    <script>
        document.addEventListener(
            'DOMContentLoaded',
            function () {
                if (typeof window.switchModule === 'function') {
                    window.switchModule(null, 'captioning');
                } else {
                    const contentArea =
                        document.getElementById('contentArea');

                    if (contentArea) {
                        contentArea.setAttribute(
                            'aria-busy',
                            'false'
                        );

                        contentArea.innerHTML = `
                            <div class="module-load-error" role="alert">
                                <h2>Unable to load the module</h2>
                                <p>
                                    The dashboard script did not load correctly.
                                    Please refresh the page.
                                </p>
                            </div>
                        `;
                    }

                    console.error(
                        'switchModule() was not loaded from script.js'
                    );
                }
            }
        );
    </script>
</body>
</html>
