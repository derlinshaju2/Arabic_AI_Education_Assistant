<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .callback-card { text-align: center; max-width: 420px; padding: 40px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #0d9488; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { margin-top: 16px; padding: 10px 12px; border-radius: 8px; font-size: 14px; }
        .error { border: 1px solid rgba(220,38,38,0.2); color: #dc2626; background: #fef2f2; }
    </style>
</head>
<body>
    <div class="callback-card">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Signing you in...</h2>
        <p id="message">Processing your Google authentication.</p>
    </div>

    <script>
        (function() {
            var hash = window.location.hash;
            var params = new URLSearchParams(hash ? hash.substring(1) : '');
            var error = params.get('error');

            if (error) {
                document.getElementById('title').textContent = 'Authentication Error';
                document.getElementById('message').textContent = params.get('error_description') || 'Google could not complete sign-in.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            if (!hash || hash.indexOf('id_token') === -1) {
                document.getElementById('title').textContent = 'Authentication Error';
                document.getElementById('message').textContent = 'No token found in the URL.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            var idToken = params.get('id_token');
            var state = params.get('state');

            if (!idToken) {
                document.getElementById('title').textContent = 'Authentication Error';
                document.getElementById('message').textContent = 'Could not extract token from URL.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            // POST the token to our server
            fetch('/google-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ credential: idToken, state: state })
            })
            .then(function(res) {
                if (res.ok || res.redirected) {
                    window.location.href = '/modules';
                } else {
                    return res.json().then(function(data) {
                        document.getElementById('title').textContent = 'Sign-In Failed';
                        document.getElementById('message').textContent = data.message || 'Could not sign in with Google.';
                        document.getElementById('spinner').style.display = 'none';
                    });
                }
            })
            .catch(function() {
                document.getElementById('title').textContent = 'Network Error';
                document.getElementById('message').textContent = 'Please check your connection and try again.';
                document.getElementById('spinner').style.display = 'none';
            });
        })();
    </script>
</body>
</html>
